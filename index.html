<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>linea dinamica</title>
</head>
<body>

<h2>Línea Dinámica DESARROLLADO POR JHON ALEXANDER MAMANI VASQUEZ</h2>

<canvas id="myCanvas" width="1800" height="400" style="border:1px solid black;"></canvas>

<script>
var canvas = document.getElementById("myCanvas");
var ctx = canvas.getContext("2d");

var time = 0;

// FUNCION PARA DIBUJAR EJES
function drawAxes() {
    ctx.beginPath();
    ctx.strokeStyle = "black";
    ctx.lineWidth = 1;

    // eje X
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);

    // eje Y
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);

    ctx.stroke();
}
function drawGraph() {
    ctx.beginPath();
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;

    for (var x = 0; x < canvas.width; x++) {
        var y = Math.sin((x * 0.02) + time);

        var posY = canvas.height / 2 - y * 100;

        if (x === 0) {
            ctx.moveTo(x, posY);
        } else {
            ctx.lineTo(x, posY);
        }
    }

    ctx.stroke();
}

// ANIMACION
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawAxes();   // dibuja plano cartesiano
    drawGraph();  // dibuja la función

    time += 0.05;
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
